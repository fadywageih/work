<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Market - طلب صيانة</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="font-[Cairo] bg-[#0a0c0f] text-[#e5e7eb] overflow-x-hidden">

    <!-- Loader -->
    <div id="loader"
        class="fixed inset-0 bg-[#0a0c0f] flex items-center justify-center z-[9999] transition-opacity duration-800">
        <div class="text-center">
            <div class="w-20 h-20 border-4 border-[#3b82f6]/20 border-t-[#3b82f6] rounded-full animate-spin mb-4"></div>
            <p class="text-[#60a5fa] text-lg font-bold animate-pulse">جاري التحميل...</p>
        </div>
    </div>

    <!-- Scroll Progress Bar -->
    <div id="scrollProgress"
        class="fixed top-0 left-0 h-1 bg-gradient-to-r from-[#3b82f6] via-[#a78bfa] to-[#f59e0b] z-[9998] transition-all duration-100">
    </div>

    <!-- Floating Action Button -->
    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})"
        class="fixed bottom-5 md:bottom-8 right-5 md:right-8 w-12 h-12 md:w-14 md:h-14 bg-gradient-to-r from-[#3b82f6] to-[#a78bfa] rounded-full flex items-center justify-center text-[#0a0c0f] text-xl md:text-2xl shadow-lg z-[9997] transition-all duration-300 border-2 border-white/10 hover:scale-110 hover:shadow-[#3b82f6]/80">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Floating Particles -->
    <div id="particles" class="fixed inset-0 pointer-events-none z-0"></div>

    <!-- Navbar -->
    <nav id="navbar"
        class="fixed top-0 w-full bg-[#0a0c0f]/95 backdrop-blur-md z-50 transition-all duration-400 border-b border-[#3b82f6]/20">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16 md:h-20">
                <!-- Logo -->
                <a href="index.html" class="block">
                    <img src="Images/logo.png" alt="Tech Market" class="h-12 md:h-14 w-auto object-contain">
                </a>

                <!-- Desktop Menu -->
                <div class="hidden lg:flex items-center gap-2">
                    <a href="index.html#home"
                        class="nav-link px-4 py-2 text-[#9ca3af] font-semibold rounded-xl hover:text-[#3b82f6] hover:bg-[#3b82f6]/10 transition-all duration-300">الرئيسية</a>
                    <a href="shop.html"
                        class="nav-link px-4 py-2 text-[#9ca3af] font-semibold rounded-xl hover:text-[#3b82f6] hover:bg-[#3b82f6]/10 transition-all duration-300">المتجر</a>
                    <a href="repair.html"
                        class="nav-link px-4 py-2 text-[#60a5fa] font-semibold rounded-xl bg-[#3b82f6]/15">الصيانة</a>
                    <a href="index.html#education"
                        class="nav-link px-4 py-2 text-[#9ca3af] font-semibold rounded-xl hover:text-[#3b82f6] hover:bg-[#3b82f6]/10 transition-all duration-300">تعلم</a>
                    <a href="index.html#contact"
                        class="nav-link px-4 py-2 text-[#9ca3af] font-semibold rounded-xl hover:text-[#3b82f6] hover:bg-[#3b82f6]/10 transition-all duration-300">اتصل
                        بنا</a>
                </div>

                <!-- Actions -->
                <div class="flex items-center gap-2 sm:gap-3">
                    <a href="https://wa.me/201270114646" target="_blank"
                        class="hidden sm:flex items-center gap-2 bg-gradient-to-r from-[#3b82f6] to-[#a78bfa] text-[#0a0c0f] px-4 md:px-6 py-1.5 md:py-2 rounded-xl font-bold text-sm md:text-base shadow-lg shadow-[#3b82f6]/30 hover:shadow-[#3b82f6]/50 hover:-translate-y-1 transition-all duration-300">
                        <i class="fas fa-phone"></i>
                        <span class="hidden md:inline">01270114646</span>
                    </a>

                    <!-- Mobile Menu Button -->
                    <button onclick="toggleMobileMenu()"
                        class="lg:hidden flex items-center justify-center w-10 h-10 rounded-xl border-2 border-gray-700 text-gray-400 hover:border-[#3b82f6] hover:text-[#3b82f6] transition-all duration-300">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div id="mobileMenu" class="hidden lg:hidden bg-[#1e2126] border-t border-[#2d3138] py-4">
            <div class="container mx-auto px-4 flex flex-col gap-2">
                <a href="index.html#home" onclick="closeMobileMenu()"
                    class="mobile-nav-link block py-3 text-center font-semibold text-[#9ca3af] rounded-lg hover:bg-gradient-to-r hover:from-[#3b82f6] hover:to-[#a78bfa] hover:text-[#0a0c0f] transition-all duration-300">الرئيسية</a>
                <a href="shop.html" onclick="closeMobileMenu()"
                    class="mobile-nav-link block py-3 text-center font-semibold text-[#9ca3af] rounded-lg hover:bg-gradient-to-r hover:from-[#3b82f6] hover:to-[#a78bfa] hover:text-[#0a0c0f] transition-all duration-300">المتجر</a>
                <a href="repair.html" onclick="closeMobileMenu()"
                    class="mobile-nav-link block py-3 text-center font-semibold text-[#0a0c0f] rounded-lg bg-gradient-to-r from-[#3b82f6] to-[#a78bfa]">الصيانة</a>
                <a href="index.html#education" onclick="closeMobileMenu()"
                    class="mobile-nav-link block py-3 text-center font-semibold text-[#9ca3af] rounded-lg hover:bg-gradient-to-r hover:from-[#3b82f6] hover:to-[#a78bfa] hover:text-[#0a0c0f] transition-all duration-300">تعلم</a>
                <a href="index.html#contact" onclick="closeMobileMenu()"
                    class="mobile-nav-link block py-3 text-center font-semibold text-[#9ca3af] rounded-lg hover:bg-gradient-to-r hover:from-[#3b82f6] hover:to-[#a78bfa] hover:text-[#0a0c0f] transition-all duration-300">اتصل
                    بنا</a>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="pt-28 md:pt-32 pb-12 bg-gradient-to-b from-[#0a0c0f] to-[#1e2126]">
        <div class="container mx-auto px-4 text-center">
            <h1
                class="text-4xl md:text-5xl lg:text-6xl font-black mb-4 bg-gradient-to-r from-[#3b82f6] via-[#a78bfa] to-[#f59e0b] bg-clip-text text-transparent">
                طلب صيانة</h1>
            <p class="text-[#9ca3af] text-lg max-w-2xl mx-auto">املأ النموذج التالي وسيتم التواصل معك في أقرب وقت</p>
        </div>
    </section>

    <!-- Repair Request Form -->
    <section class="py-12 bg-[#0a0c0f]">
        <div class="container mx-auto px-4">
            <div class="max-w-3xl mx-auto glass bg-white/3 backdrop-blur-md border border-white/3 rounded-2xl md:rounded-3xl p-6 md:p-8 lg:p-10"
                data-aos="fade-up">

                <!-- Device Type Selection -->
                <div class="mb-8">
                    <label class="block text-[#f3f4f6] text-lg font-bold mb-4">اختر نوع الجهاز</label>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <label class="device-option cursor-pointer">
                            <input type="radio" name="deviceType" value="لابتوب" class="hidden peer" checked>
                            <div
                                class="p-6 bg-[#1e2126] border-2 border-[#2d3138] rounded-2xl text-center transition-all duration-300 peer-checked:border-[#3b82f6] peer-checked:bg-[#3b82f6]/10 hover:border-[#3b82f6] hover:-translate-y-1">
                                <i class="fas fa-laptop text-3xl text-[#3b82f6] mb-3"></i>
                                <h3 class="font-bold text-[#f3f4f6]">لابتوب</h3>
                            </div>
                        </label>

                        <label class="device-option cursor-pointer">
                            <input type="radio" name="deviceType" value="بي سي" class="hidden peer">
                            <div
                                class="p-6 bg-[#1e2126] border-2 border-[#2d3138] rounded-2xl text-center transition-all duration-300 peer-checked:border-[#3b82f6] peer-checked:bg-[#3b82f6]/10 hover:border-[#3b82f6] hover:-translate-y-1">
                                <i class="fas fa-tv text-3xl text-[#3b82f6] mb-3"></i>
                                <h3 class="font-bold text-[#f3f4f6]">بي سي</h3>
                            </div>
                        </label>

                        <label class="device-option cursor-pointer">
                            <input type="radio" name="deviceType" value="شاشة" class="hidden peer">
                            <div
                                class="p-6 bg-[#1e2126] border-2 border-[#2d3138] rounded-2xl text-center transition-all duration-300 peer-checked:border-[#3b82f6] peer-checked:bg-[#3b82f6]/10 hover:border-[#3b82f6] hover:-translate-y-1">
                                <i class="fas fa-tv text-3xl text-[#3b82f6] mb-3"></i>
                                <h3 class="font-bold text-[#f3f4f6]">شاشة</h3>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Specifications Form -->
                <div class="space-y-6">
                    <!-- Device Model -->
                    <div>
                        <label class="block text-[#f3f4f6] text-lg font-bold mb-2">الموديل</label>
                        <input type="text" id="deviceModel" placeholder="مثال: Dell Latitude E5250"
                            class="w-full bg-[#1e2126]/80 border-2 border-[#2d3138] rounded-2xl px-5 py-4 text-[#f3f4f6] text-base transition-all duration-300 focus:outline-none focus:border-[#3b82f6] focus:shadow-[0_0_30px_rgba(59,130,246,0.3)] focus:bg-[#1e2126] placeholder:text-[#9ca3af]">
                    </div>

                    <!-- Specifications Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Processor -->
                        <div>
                            <label class="block text-[#f3f4f6] font-bold mb-2">المعالج (Processor)</label>
                            <input type="text" id="processor" placeholder="مثال: Intel Core i7"
                                class="w-full bg-[#1e2126]/80 border-2 border-[#2d3138] rounded-xl px-4 py-3 text-[#f3f4f6] text-sm transition-all duration-300 focus:outline-none focus:border-[#3b82f6] placeholder:text-[#9ca3af]">
                        </div>

                        <!-- RAM -->
                        <div>
                            <label class="block text-[#f3f4f6] font-bold mb-2">الرامات (RAM)</label>
                            <input type="text" id="ram" placeholder="مثال: 16GB"
                                class="w-full bg-[#1e2126]/80 border-2 border-[#2d3138] rounded-xl px-4 py-3 text-[#f3f4f6] text-sm transition-all duration-300 focus:outline-none focus:border-[#3b82f6] placeholder:text-[#9ca3af]">
                        </div>

                        <!-- Storage -->
                        <div>
                            <label class="block text-[#f3f4f6] font-bold mb-2">التخزين (Storage)</label>
                            <input type="text" id="storage" placeholder="مثال: 512GB SSD"
                                class="w-full bg-[#1e2126]/80 border-2 border-[#2d3138] rounded-xl px-4 py-3 text-[#f3f4f6] text-sm transition-all duration-300 focus:outline-none focus:border-[#3b82f6] placeholder:text-[#9ca3af]">
                        </div>

                        <!-- Graphics Card -->
                        <div>
                            <label class="block text-[#f3f4f6] font-bold mb-2">كارت الشاشة (GPU)</label>
                            <input type="text" id="gpu" placeholder="مثال: RTX 3060"
                                class="w-full bg-[#1e2126]/80 border-2 border-[#2d3138] rounded-xl px-4 py-3 text-[#f3f4f6] text-sm transition-all duration-300 focus:outline-none focus:border-[#3b82f6] placeholder:text-[#9ca3af]">
                        </div>
                    </div>

                    <!-- Problem Description -->
                    <div>
                        <label class="block text-[#f3f4f6] text-lg font-bold mb-2">وصف المشكلة</label>
                        <textarea id="problemDesc" rows="5" placeholder="اكتب هنا وصف تفصيلي للمشكلة التي تواجهها..."
                            class="w-full bg-[#1e2126]/80 border-2 border-[#2d3138] rounded-2xl px-5 py-4 text-[#f3f4f6] text-base transition-all duration-300 focus:outline-none focus:border-[#3b82f6] focus:shadow-[0_0_30px_rgba(59,130,246,0.3)] focus:bg-[#1e2126] placeholder:text-[#9ca3af] resize-y min-h-[150px]"></textarea>
                    </div>

                    <!-- Customer Info -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-[#f3f4f6] font-bold mb-2">الاسم</label>
                            <input type="text" id="customerName" placeholder="الاسم كامل"
                                class="w-full bg-[#1e2126]/80 border-2 border-[#2d3138] rounded-xl px-4 py-3 text-[#f3f4f6] text-sm transition-all duration-300 focus:outline-none focus:border-[#3b82f6] placeholder:text-[#9ca3af]">
                        </div>
                        <div>
                            <label class="block text-[#f3f4f6] font-bold mb-2">رقم الهاتف</label>
                            <input type="tel" id="customerPhone" placeholder="مثال: 01270114646"
                                class="w-full bg-[#1e2126]/80 border-2 border-[#2d3138] rounded-xl px-4 py-3 text-[#f3f4f6] text-sm transition-all duration-300 focus:outline-none focus:border-[#3b82f6] placeholder:text-[#9ca3af]">
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button onclick="sendRepairRequest()"
                        class="w-full bg-gradient-to-r from-[#3b82f6] to-[#a78bfa] text-[#0a0c0f] py-5 rounded-2xl font-bold text-lg shadow-lg shadow-[#3b82f6]/30 hover:shadow-[#3b82f6]/50 hover:-translate-y-1 transition-all duration-300 mt-8">
                        <i class="fab fa-whatsapp ml-2 text-2xl"></i>
                        إرسال طلب الصيانة عبر واتساب
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-[#2d3138] text-[#9ca3af] py-10 md:py-12 border-t border-[#2d3138] mt-12">
        <div class="container mx-auto px-4 text-center">
            <div class="flex items-center justify-center gap-3 mb-6">
                <img src="Images/logo.png" alt="Tech Market" class="h-10 md:h-12 w-auto object-contain">
            </div>
            <p class="mb-6 text-[#9ca3af] text-sm md:text-base">وجهتك الأولى لبيع وشراء وصيانة الأجهزة</p>

<div class="flex justify-center gap-3 md:gap-4 mb-8 flex-wrap">
    <!-- فيسبوك -->
    <a href="https://www.facebook.com/share/182Tqj1RLg/" target="_blank"
        class="social-link w-10 h-10 md:w-12 md:h-12 bg-[#1e2126] rounded-full flex items-center justify-center transition-all duration-300 border border-[#3b82f6]/20 text-[#9ca3af] hover:border-[#3b82f6] hover:text-[#3b82f6] hover:-translate-y-1 hover:shadow-[0_10px_20px_-5px_rgba(59,130,246,0.5)]">
        <i class="fab fa-facebook-f text-sm md:text-base"></i>

    <!-- انستغرام -->
    <a href="https://www.instagram.com/downtechstore" target="_blank"
        class="social-link w-10 h-10 md:w-12 md:h-12 bg-[#1e2126] rounded-full flex items-center justify-center transition-all duration-300 border border-[#3b82f6]/20 text-[#9ca3af] hover:border-[#3b82f6] hover:text-[#3b82f6] hover:-translate-y-1 hover:shadow-[0_10px_20px_-5px_rgba(59,130,246,0.5)]">
        <i class="fab fa-instagram text-sm md:text-base"></i>
    </a>
    
    <!-- يوتيوب -->
    <a href="https://www.youtube.com/@DOWNTECHSTORE" target="_blank"
        class="social-link w-10 h-10 md:w-12 md:h-12 bg-[#1e2126] rounded-full flex items-center justify-center transition-all duration-300 border border-[#3b82f6]/20 text-[#9ca3af] hover:border-red-600 hover:text-red-600 hover:-translate-y-1 hover:shadow-[0_10px_20px_-5px_rgba(220,38,38,0.5)]">
        <i class="fab fa-youtube text-sm md:text-base"></i>
    </a>
    
    <!-- تيك توك -->
    <a href="https://www.tiktok.com/@down.tech.store" target="_blank"

        <i class="fab fa-tiktok text-sm md:text-base"></i>
    </a>
</div>

            <p class="text-xs md:text-sm text-gray-600">© 2026 Tech Market. جميع الحقوق محفوظة</p>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/main.js"></script>
    <script src="js/repair.js"></script>
</body>

</html>
